<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Insight - Real-time Workflow Monitoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .connection-toggle {
            display: flex;
            gap: 0.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 9999px;
            padding: 0.25rem;
        }

        .connection-toggle button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 9999px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .connection-toggle button.active {
            background: #3b82f6;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #e2e8f0;
        }

        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stream-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-badge.connected {
            background: #10b98114;
            color: #34d399;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stream-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .stream-entry {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1rem;
        }

        .stream-entry:last-child {
            border-bottom: none;
        }

        .entry-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .entry-icon.event {
            background: #3b82f614;
            color: #60a5fa;
        }

        .entry-icon.effect {
            background: #8b5cf614;
            color: #a78bfa;
        }

        .entry-icon.success {
            background: #10b98114;
            color: #34d399;
        }

        .entry-icon.error {
            background: #ef444414;
            color: #f87171;
        }

        .entry-content {
            min-width: 0;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 0.25rem;
        }

        .entry-type {
            font-weight: 600;
            color: #f8fafc;
        }

        .entry-time {
            font-size: 0.75rem;
            color: #64748b;
            white-space: nowrap;
        }

        .entry-details {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .correlation-id {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.25rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .correlation-id:hover {
            color: #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .tree-container {
            padding: 1rem;
        }

        .tree-node {
            margin-left: 2rem;
            border-left: 2px solid #334155;
            padding-left: 1rem;
            margin-top: 0.5rem;
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .tree-node-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            background: #3b82f614;
            color: #60a5fa;
        }

        .tree-node-type {
            font-weight: 600;
            color: #f8fafc;
            font-size: 0.875rem;
        }

        .tree-node-time {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: auto;
        }

        .tree-effects {
            margin-top: 0.5rem;
            padding-left: 1.5rem;
        }

        .tree-effect {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .tree-effect-icon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .tree-effect.completed .tree-effect-icon {
            background: #10b98114;
            color: #34d399;
        }

        .tree-effect.failed .tree-effect-icon {
            background: #ef444414;
            color: #f87171;
        }

        .tree-effect.pending .tree-effect-icon {
            background: #8b5cf614;
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Seesaw Insight</h1>
                <p class="subtitle">Real-time workflow monitoring</p>
            </div>
            <div class="header-right">
                <div class="connection-toggle">
                    <button id="sse-toggle" class="active" onclick="switchConnection('sse')">SSE</button>
                    <button id="ws-toggle" onclick="switchConnection('ws')">WebSocket</button>
                </div>
                <div class="status-badge connected">
                    <span class="status-indicator"></span>
                    <span id="connection-status">Connected</span>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Events</div>
                <div class="stat-value" id="total-events">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Effects</div>
                <div class="stat-value" id="active-effects">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Recent Activity</div>
                <div class="stat-value" id="recent-entries">—</div>
            </div>
        </div>

        <div class="stream-section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('stream')">Live Stream</button>
                <button class="tab" onclick="switchTab('tree')">Tree View</button>
            </div>

            <div id="stream-tab" class="tab-content active">
                <div class="stream-list" id="stream-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <p>Waiting for workflow events...</p>
                    </div>
                </div>
            </div>

            <div id="tree-tab" class="tab-content">
                <div class="tree-container" id="tree-container">
                    <div class="empty-state">
                        <div class="empty-state-icon">🌳</div>
                        <p>Click a workflow ID in the stream to view its tree</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let eventSource = null;
        let webSocket = null;
        let connectionType = 'sse';
        let entries = [];
        let selectedWorkflow = null;
        const MAX_ENTRIES = 100;

        // Connection management
        function switchConnection(type) {
            if (type === connectionType) return;

            connectionType = type;
            document.getElementById('sse-toggle').classList.toggle('active', type === 'sse');
            document.getElementById('ws-toggle').classList.toggle('active', type === 'ws');

            // Close existing connections
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            if (webSocket) {
                webSocket.close();
                webSocket = null;
            }

            // Start new connection
            if (type === 'sse') {
                connectSSE();
            } else {
                connectWebSocket();
            }
        }

        // Connect to SSE stream
        function connectSSE() {
            eventSource = new EventSource('/api/stream?cursor=0&limit=100');

            eventSource.onmessage = (event) => {
                const entry = JSON.parse(event.data);
                addEntry(entry);
            };

            eventSource.onerror = () => {
                document.getElementById('connection-status').textContent = 'Reconnecting...';
                setTimeout(connectSSE, 1000);
            };

            document.getElementById('connection-status').textContent = 'Connected (SSE)';
        }

        // Connect to WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}/api/ws?cursor=0`;
            webSocket = new WebSocket(url);

            webSocket.onopen = () => {
                document.getElementById('connection-status').textContent = 'Connected (WebSocket)';
            };

            webSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type !== 'connected') {
                    addEntry(data);
                }
            };

            webSocket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            webSocket.onclose = () => {
                document.getElementById('connection-status').textContent = 'Reconnecting...';
                setTimeout(connectWebSocket, 1000);
            };
        }

        // Fetch stats
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                document.getElementById('total-events').textContent = stats.total_events.toLocaleString();
                document.getElementById('active-effects').textContent = stats.active_effects.toLocaleString();
                document.getElementById('recent-entries').textContent = stats.recent_entries.toLocaleString();
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        // Add entry to stream
        function addEntry(entry) {
            entries.unshift(entry);
            if (entries.length > MAX_ENTRIES) {
                entries.pop();
            }
            renderStream();
        }

        // Render stream
        function renderStream() {
            const list = document.getElementById('stream-list');

            if (entries.length === 0) {
                return;
            }

            list.innerHTML = entries.map(entry => {
                const icon = getEntryIcon(entry);
                const time = new Date(entry.created_at).toLocaleTimeString();

                return `
                    <div class="stream-entry">
                        <div class="entry-icon ${icon.class}">
                            ${icon.symbol}
                        </div>
                        <div class="entry-content">
                            <div class="entry-header">
                                <span class="entry-type">${formatType(entry.stream_type)}</span>
                                <span class="entry-time">${time}</span>
                            </div>
                            <div class="entry-details">${formatDetails(entry)}</div>
                            <div class="correlation-id" onclick="loadTree('${entry.correlation_id}')">
                                workflow: ${entry.correlation_id.substring(0, 8)}...
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getEntryIcon(entry) {
            if (entry.stream_type === 'event_dispatched') {
                return { symbol: '📤', class: 'event' };
            } else if (entry.stream_type === 'effect_started') {
                return { symbol: '⚙️', class: 'effect' };
            } else if (entry.stream_type === 'effect_completed') {
                return { symbol: '✅', class: 'success' };
            } else if (entry.stream_type === 'effect_failed') {
                return { symbol: '❌', class: 'error' };
            }
            return { symbol: '•', class: 'event' };
        }

        function formatType(type) {
            return type.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function formatDetails(entry) {
            if (entry.stream_type === 'event_dispatched') {
                const eventType = entry.payload?.event_type || 'Unknown';
                return `Event: ${eventType}`;
            } else if (entry.effect_id) {
                return `Effect: ${entry.effect_id}`;
            }
            return 'Workflow activity';
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        // Load and render tree
        async function loadTree(correlationId) {
            selectedWorkflow = correlationId;
            switchTab('tree');

            const container = document.getElementById('tree-container');
            container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><p>Loading tree...</p></div>';

            try {
                const response = await fetch(`/api/tree/${correlationId}`);
                const tree = await response.json();
                renderTree(tree);
            } catch (error) {
                console.error('Failed to load tree:', error);
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><p>Failed to load tree</p></div>';
            }
        }

        function renderTree(nodes) {
            const container = document.getElementById('tree-container');
            container.innerHTML = nodes.map(renderTreeNode).join('');
        }

        function renderTreeNode(node) {
            const time = new Date(node.created_at).toLocaleTimeString();
            const effects = node.effects.map(e => `
                <div class="tree-effect ${e.status}">
                    <span class="tree-effect-icon">${e.status === 'completed' ? '✓' : e.status === 'failed' ? '✗' : '⋯'}</span>
                    <span>${e.effect_id}</span>
                    ${e.attempts > 1 ? `<span>(${e.attempts} attempts)</span>` : ''}
                </div>
            `).join('');

            const children = node.children.map(renderTreeNode).join('');

            return `
                <div class="tree-node">
                    <div class="tree-node-header">
                        <span class="tree-node-icon">📤</span>
                        <span class="tree-node-type">${node.event_type}</span>
                        <span class="tree-node-time">${time}</span>
                    </div>
                    ${effects ? `<div class="tree-effects">${effects}</div>` : ''}
                    ${children}
                </div>
            `;
        }

        // Initialize
        connectSSE();
        fetchStats();
        setInterval(fetchStats, 5000);
    </script>
</body>
</html>
