<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Workflow Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
            color: #4ec9b0;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover {
            background: #1177bb;
        }
        button:active {
            background: #0d5a8f;
        }
        button.danger {
            background: #c5382e;
        }
        button.danger:hover {
            background: #d9534f;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3e3e42;
            transition: border-color 0.2s;
        }
        .stat:hover {
            border-color: #4ec9b0;
        }
        .stat-label {
            font-size: 13px;
            color: #858585;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #4ec9b0;
        }
        .stat-value.warning {
            color: #dcdcaa;
        }
        .stat-value.error {
            color: #f48771;
        }
        #mermaid-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            overflow: auto;
            min-height: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        #mermaid-diagram {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
        }
        .empty-state {
            text-align: center;
            color: #858585;
            padding: 60px 20px;
        }
        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        .empty-state h3 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #d4d4d4;
        }
        .empty-state p {
            font-size: 14px;
            margin: 0;
        }
        .error {
            background: #5a1d1d;
            color: #f48771;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #823c39;
        }
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }
        .badge.on {
            background: #1a7f37;
            color: white;
        }
        .badge.off {
            background: #3e3e42;
            color: #858585;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Seesaw Workflow Visualization</h1>
            <div class="controls">
                <button onclick="refresh()">
                    <span class="loading" id="loading" style="display:none;"></span>
                    <span id="refresh-text">🔄 Refresh</span>
                </button>
                <button class="danger" onclick="clearSpans()">🗑️ Clear</button>
                <button onclick="toggleAutoRefresh()">
                    ⏱️ Auto-refresh
                    <span class="badge" id="auto-badge">OFF</span>
                </button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-label">Total Spans</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Root Events</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Completed</div>
                <div class="stat-value">-</div>
            </div>
            <div class="stat">
                <div class="stat-label">Failed</div>
                <div class="stat-value error">-</div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="mermaid-container">
            <div id="mermaid-diagram">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    <h3>No events captured yet</h3>
                    <p>Trigger some events in your application to see the workflow visualization</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });

        let autoRefreshInterval = null;
        let isRefreshing = false;

        async function refresh() {
            if (isRefreshing) return;

            isRefreshing = true;
            document.getElementById('loading').style.display = 'inline-block';
            document.getElementById('refresh-text').textContent = '';

            try {
                const [statsResp, diagramResp] = await Promise.all([
                    fetch('/seesaw/api/stats'),
                    fetch('/seesaw/api/diagram')
                ]);

                if (!statsResp.ok || !diagramResp.ok) {
                    throw new Error('Failed to fetch data from server');
                }

                const stats = await statsResp.json();
                const { diagram } = await diagramResp.json();

                // Update stats
                const statsHtml = `
                    <div class="stat">
                        <div class="stat-label">Total Spans</div>
                        <div class="stat-value">${stats.total_spans}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Root Events</div>
                        <div class="stat-value">${stats.root_spans}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value">${stats.complete_spans}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Failed</div>
                        <div class="stat-value ${stats.failed_spans > 0 ? 'error' : ''}">${stats.failed_spans}</div>
                    </div>
                `;
                document.getElementById('stats').innerHTML = statsHtml;

                // Render Mermaid diagram
                const diagramContainer = document.getElementById('mermaid-diagram');

                if (diagram.includes('No events captured') || stats.total_spans === 0) {
                    diagramContainer.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                            <h3>No events captured yet</h3>
                            <p>Trigger some events in your application to see the workflow visualization</p>
                        </div>
                    `;
                } else {
                    diagramContainer.innerHTML = '';
                    const { svg } = await mermaid.render('mermaid-graph-' + Date.now(), diagram);
                    diagramContainer.innerHTML = svg;
                }

                document.getElementById('error').style.display = 'none';
            } catch (err) {
                console.error('Refresh error:', err);
                document.getElementById('error').textContent = `Error: ${err.message}`;
                document.getElementById('error').style.display = 'block';
            } finally {
                isRefreshing = false;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('refresh-text').textContent = '🔄 Refresh';
            }
        }

        async function clearSpans() {
            if (!confirm('Clear all collected spans?')) return;

            try {
                await fetch('/seesaw/api/clear', { method: 'POST' });
                await refresh();
            } catch (err) {
                alert('Failed to clear spans: ' + err.message);
            }
        }

        function toggleAutoRefresh() {
            const badge = document.getElementById('auto-badge');

            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                badge.textContent = 'OFF';
                badge.className = 'badge off';
            } else {
                autoRefreshInterval = setInterval(refresh, 2000);
                badge.textContent = 'ON';
                badge.className = 'badge on';
                refresh(); // Immediate refresh
            }
        }

        // Initial load
        refresh();
    </script>
</body>
</html>
